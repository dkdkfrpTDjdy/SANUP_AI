<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>산업장비 PDF 생성 AI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card hero">
        <div class="eyebrow">산업장비 PDF 생성 AI</div>
        <h1>임대대수 파일 업로드</h1>
        <p>
          기존 임대대수 데이터 원본 → 데이터 전처리를 순서대로 처리해 최종 PDF를 생성합니다.
          중간 대시보드는 내부적으로 생성되며, 필요 시 함께 다운로드할 수 있습니다.
        </p>
      </section>

      <section class="card">
        <label class="label" for="fileInput">원본 Excel(.xlsx)</label>
        <input id="fileInput" type="file" accept=".xlsx" />
        <button id="runButton" class="primary">실행</button>
      </section>

      <section class="card status-card">
        <div class="status-row">
          <span class="label">상태</span>
          <strong id="statusText">대기 중</strong>
        </div>
        <div class="status-row">
          <span class="label">진행 단계</span>
          <strong id="stepText">-</strong>
        </div>
        <div class="progress-wrap">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <pre id="logBox" class="log-box">로그가 여기에 표시됩니다.</pre>
      </section>

      <section class="card actions">
        <a id="pdfLink" class="ghost hidden" href="#" download>PDF 다운로드</a>
        <a id="excelLink" class="ghost hidden" href="#" download>중간 Excel 다운로드</a>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
